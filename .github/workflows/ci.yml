name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  commit-lint:
    name: commit lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate PR commits
        shell: bash
        run: |
          # Check all commits in the PR follow conventional format
          MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD)
          ERRORS=0
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'

          while IFS= read -r sha; do
            MSG=$(git log --format='%s' -n1 "$sha")
            if ! [[ "$MSG" =~ $PATTERN ]]; then
              echo "::error::Bad commit message: $MSG"
              echo "  Expected: <type>[(scope)][!]: <description>"
              echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(git rev-list --no-merges "$MERGE_BASE"..HEAD)

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS commit(s) do not follow conventional commit format"
            echo "See: https://www.conventionalcommits.org/"
            exit 1
          fi
          echo "All commits follow conventional commit format"

  windows-check:
    name: windows build check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-windows
          cache-all-crates: true
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.2"
      - run: cargo check --all-targets
      # Run lib tests on Windows to surface platform-specific failures early
      - name: run tests (informational)
        run: cargo test --lib
        continue-on-error: true  # Windows tests not yet fully ported — tracking failures without blocking

  fmt:
    name: cargo fmt
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}
          cache-all-crates: true
      - run: cargo clippy --all-targets -- -D warnings

  integration:
    name: integration tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}
          cache-all-crates: true
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
      - name: Pull container images
        run: |
          docker pull python:3.11-alpine &
          docker pull ghcr.io/astral-sh/uv:python3.11-bookworm-slim &
          docker pull golang:1.25-alpine &
          wait
      - name: Run container executor unit tests
        run: cargo test container_executor
      - name: Run integration tests
        run: cargo test -- --ignored --test-threads=1 --skip test_go_e2e_real_llm

  test-cov:
    name: test-cov
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # tokio::process + kill_on_drop eliminates the profdata deadlock — ARM is safe now
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}
          cache-all-crates: true
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
      - name: Run tests with coverage
        run: |
          cargo llvm-cov --lib --no-report
          cargo llvm-cov --test test_llmposter --no-report
          cargo llvm-cov report --fail-under-lines 95
          cargo llvm-cov report --lcov --output-path lcov.info
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: SkillDoAI/skilldo
          files: lcov.info

  audit:
    name: security audit
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  e2e-build:
    name: "e2e: build"
    if: github.event_name == 'push' && needs.changes.outputs.rust == 'true'
    needs: [changes, fmt, clippy, test-cov, integration, audit]
    outputs:
      skip: ${{ steps.check-secret.outputs.skip }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    env:
      CEREBRAS2_API_KEY: ${{ secrets.CEREBRAS2_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}
          cache-all-crates: true

      - name: Check API access
        id: check-secret
        run: |
          if [ -z "$CEREBRAS2_API_KEY" ]; then
            echo "::warning::CEREBRAS2_API_KEY not configured — skipping E2E"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        if: steps.check-secret.outputs.skip != 'true'
        run: cargo build --release

      - name: Upload binary
        if: steps.check-secret.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: skilldo-binary
          path: target/release/skilldo
          retention-days: 1

  e2e:
    name: "e2e: ${{ matrix.lang }}"
    if: github.event_name == 'push' && needs.changes.outputs.rust == 'true' && needs.e2e-build.outputs.skip != 'true'
    needs: [changes, e2e-build]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: python
            repo: pallets/click
            tag: "8.3.1"
            flag: "--language python"
          - lang: go
            repo: fatih/color
            tag: v1.18.0
            flag: "--language go"
          - lang: javascript
            repo: chalk/chalk
            tag: v5.4.1
            flag: "--language javascript"
          - lang: rust
            repo: dtolnay/thiserror
            tag: "2.0.12"
            flag: "--language rust"
          - lang: java
            repo: BrunoEberhard/minimal-j
            tag: "2.7.0.0"
            flag: "--language java"
    env:
      CEREBRAS2_API_KEY: ${{ secrets.CEREBRAS2_API_KEY }}
    steps:
      - uses: astral-sh/setup-uv@v7
        if: matrix.lang == 'python'
        with:
          enable-cache: false

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: skilldo-binary
          path: bin

      - name: Make binary executable
        run: chmod +x bin/skilldo

      - name: "Clone ${{ matrix.lang }} test library"
        run: git clone --branch ${{ matrix.tag }} --depth 1 https://github.com/${{ matrix.repo }}.git /tmp/test-lib

      - name: "Checkout e2e config"
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/e2e-config.toml
          sparse-checkout-cone-mode: false
          path: skilldo-src

      - name: "Generate ${{ matrix.lang }} SKILL.md"
        run: |
          ./bin/skilldo generate /tmp/test-lib \
            --config skilldo-src/.github/e2e-config.toml \
            --best-effort \
            ${{ matrix.flag }} \
            -o /tmp/test-SKILL.md
        env:
          OPENAI_API_KEY: ${{ secrets.CEREBRAS2_API_KEY }}

      - name: "Validate ${{ matrix.lang }} output"
        run: |
          FILE="/tmp/test-SKILL.md"
          ERRORS=0

          if [ ! -s "$FILE" ]; then
            echo "::error::${{ matrix.lang }} SKILL.md is empty or missing"
            exit 1
          fi
          echo "${{ matrix.lang }}: File exists ($(wc -c < "$FILE") bytes)"

          if ! head -1 "$FILE" | grep -q '^---'; then
            echo "::error::${{ matrix.lang }}: Missing YAML frontmatter"
            ERRORS=$((ERRORS + 1))
          else
            echo "${{ matrix.lang }}: Has YAML frontmatter"
          fi

          for field in "name:" "version:" "ecosystem:"; do
            if ! head -20 "$FILE" | grep -q "$field"; then
              echo "::error::${{ matrix.lang }}: Missing frontmatter field: $field"
              ERRORS=$((ERRORS + 1))
            else
              echo "${{ matrix.lang }}: Frontmatter has $field"
            fi
          done

          for section in "## Imports" "## Core Patterns" "## Pitfalls"; do
            if ! grep -q "$section" "$FILE"; then
              echo "::error::${{ matrix.lang }}: Missing required section: $section"
              ERRORS=$((ERRORS + 1))
            else
              echo "${{ matrix.lang }}: Has section: $section"
            fi
          done

          if awk '/^(```|~~~)/{p=!p; next} !p' "$FILE" | grep -P '(?<!`)rm -rf /(?!tmp)'; then
            echo "::error::${{ matrix.lang }}: destructive command found in output"
            ERRORS=$((ERRORS + 1))
          else
            echo "${{ matrix.lang }}: No destructive commands in prose"
          fi

          SIZE=$(wc -c < "$FILE")
          if [ "$SIZE" -lt 500 ]; then
            echo "::error::${{ matrix.lang }} SKILL.md suspiciously small ($SIZE bytes)"
            ERRORS=$((ERRORS + 1))
          elif [ "$SIZE" -gt 512000 ]; then
            echo "::error::${{ matrix.lang }} SKILL.md suspiciously large ($SIZE bytes)"
            ERRORS=$((ERRORS + 1))
          else
            echo "${{ matrix.lang }}: Reasonable size ($SIZE bytes)"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::${{ matrix.lang }} E2E validation failed with $ERRORS error(s)"
            exit 1
          fi
          echo ""
          echo "=== ${{ matrix.lang }} E2E structural validation passed ==="

      - name: "Lint ${{ matrix.lang }} generated skill"
        run: ./bin/skilldo lint /tmp/test-SKILL.md

      - name: Upload generated skill
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "e2e-skill-${{ matrix.lang }}"
          path: /tmp/test-SKILL.md
          if-no-files-found: ignore
