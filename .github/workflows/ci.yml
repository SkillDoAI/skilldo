name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  commit-lint:
    name: commit lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate PR commits
        shell: bash
        run: |
          # Check all commits in the PR follow conventional format
          MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD)
          ERRORS=0
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'

          while IFS= read -r sha; do
            MSG=$(git log --format='%s' -n1 "$sha")
            if ! [[ "$MSG" =~ $PATTERN ]]; then
              echo "::error::Bad commit message: $MSG"
              echo "  Expected: <type>[(scope)][!]: <description>"
              echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(git rev-list --no-merges "$MERGE_BASE"..HEAD)

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS commit(s) do not follow conventional commit format"
            echo "See: https://www.conventionalcommits.org/"
            exit 1
          fi
          echo "All commits follow conventional commit format"

  fmt:
    name: cargo fmt
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}
          cache-all-crates: true
      - run: cargo clippy --all-targets -- -D warnings

  integration:
    name: integration tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}
          cache-all-crates: true
      - uses: astral-sh/setup-uv@v7
      - name: Pull container images
        run: |
          docker pull python:3.11-alpine &
          docker pull ghcr.io/astral-sh/uv:python3.11-bookworm-slim &
          docker pull golang:1.25-alpine &
          wait
      - name: Run container executor unit tests
        run: cargo test container_executor
      - name: Run integration tests
        run: cargo test -- --ignored --test-threads=1 --skip test_go_e2e_real_llm

  test-cov:
    name: test-cov
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # tokio::process + kill_on_drop eliminates the profdata deadlock — ARM is safe now
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}
          cache-all-crates: true
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: astral-sh/setup-uv@v7
      - name: Run tests with coverage
        run: |
          cargo llvm-cov --lib --no-report
          cargo llvm-cov report --fail-under-lines 95
          cargo llvm-cov report --lcov --output-path lcov.info
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: SkillDoAI/skilldo
          files: lcov.info

  audit:
    name: security audit
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  e2e:
    name: e2e smoke test
    # Only run on main pushes with rust changes to conserve API credits.
    # Secrets aren't available on fork PRs anyway.
    if: github.event_name == 'push' && needs.changes.outputs.rust == 'true'
    needs: [changes, fmt, clippy, test-cov, integration, audit]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    env:
      CEREBRAS2_API_KEY: ${{ secrets.CEREBRAS2_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}
          cache-all-crates: true
      - uses: astral-sh/setup-uv@v7

      - name: Check API access
        id: check-secret
        run: |
          if [ -z "$CEREBRAS2_API_KEY" ]; then
            echo "::warning::CEREBRAS2_API_KEY not configured — skipping E2E"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        if: steps.check-secret.outputs.skip != 'true'
        run: cargo build --release

      - name: Clone Python test library (click)
        if: steps.check-secret.outputs.skip != 'true'
        run: git clone --branch 8.3.1 --depth 1 https://github.com/pallets/click.git /tmp/click

      - name: Generate Python SKILL.md
        if: steps.check-secret.outputs.skip != 'true'
        run: |
          ./target/release/skilldo generate /tmp/click \
            --provider openai-compatible \
            --model gpt-oss-120b \
            --base-url https://api.cerebras.ai/v1 \
            --max-retries 5 \
            -o /tmp/click-SKILL.md
        env:
          OPENAI_API_KEY: ${{ secrets.CEREBRAS2_API_KEY }}

      - name: Validate Python output
        if: steps.check-secret.outputs.skip != 'true'
        run: |
          FILE="/tmp/click-SKILL.md"
          ERRORS=0

          # 1. File exists and is non-empty
          if [ ! -s "$FILE" ]; then
            echo "::error::SKILL.md is empty or missing"
            exit 1
          fi
          echo "✓ File exists ($(wc -c < "$FILE") bytes)"

          # 2. Has YAML frontmatter
          if ! head -1 "$FILE" | grep -q '^---'; then
            echo "::error::Missing YAML frontmatter (no opening ---)"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ Has YAML frontmatter"
          fi

          # 3. Required frontmatter fields
          for field in "name:" "version:" "ecosystem:"; do
            if ! head -20 "$FILE" | grep -q "$field"; then
              echo "::error::Missing frontmatter field: $field"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ Frontmatter has $field"
            fi
          done

          # 4. Required sections
          for section in "## Imports" "## Core Patterns" "## Pitfalls"; do
            if ! grep -q "$section" "$FILE"; then
              echo "::error::Missing required section: $section"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ Has section: $section"
            fi
          done

          # 5. No security lint keywords in prose (basic sanity check)
          if awk '/^(```|~~~)/{p=!p; next} !p' "$FILE" | grep -Pn '(?<!`)rm -rf /(?!tmp)'; then
            echo "::error::Security: destructive command found in output"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ No destructive commands in prose"
          fi

          # 6. Reasonable size (>500 bytes, <500KB)
          SIZE=$(wc -c < "$FILE")
          if [ "$SIZE" -lt 500 ]; then
            echo "::error::SKILL.md suspiciously small ($SIZE bytes)"
            ERRORS=$((ERRORS + 1))
          elif [ "$SIZE" -gt 512000 ]; then
            echo "::error::SKILL.md suspiciously large ($SIZE bytes)"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ Reasonable size ($SIZE bytes)"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::E2E validation failed with $ERRORS error(s)"
            exit 1
          fi
          echo ""
          echo "=== E2E structural validation passed ==="

      - name: Lint Python skill
        if: steps.check-secret.outputs.skip != 'true'
        run: ./target/release/skilldo lint /tmp/click-SKILL.md

      - name: Clone Go test library (chi)
        if: steps.check-secret.outputs.skip != 'true'
        run: git clone --branch v5.2.1 --depth 1 https://github.com/go-chi/chi.git /tmp/chi

      - name: Generate Go SKILL.md
        if: steps.check-secret.outputs.skip != 'true'
        run: |
          ./target/release/skilldo generate /tmp/chi \
            --provider openai-compatible \
            --model gpt-oss-120b \
            --base-url https://api.cerebras.ai/v1 \
            --language go \
            --max-retries 5 \
            -o /tmp/chi-SKILL.md
        env:
          OPENAI_API_KEY: ${{ secrets.CEREBRAS2_API_KEY }}

      - name: Validate Go output
        if: steps.check-secret.outputs.skip != 'true'
        run: |
          FILE="/tmp/chi-SKILL.md"
          ERRORS=0

          if [ ! -s "$FILE" ]; then
            echo "::error::Go SKILL.md is empty or missing"
            exit 1
          fi
          echo "Go: File exists ($(wc -c < "$FILE") bytes)"

          if ! head -1 "$FILE" | grep -q '^---'; then
            echo "::error::Go: Missing YAML frontmatter"
            ERRORS=$((ERRORS + 1))
          else
            echo "Go: Has YAML frontmatter"
          fi

          for field in "name:" "version:" "ecosystem:"; do
            if ! head -20 "$FILE" | grep -q "$field"; then
              echo "::error::Go: Missing frontmatter field: $field"
              ERRORS=$((ERRORS + 1))
            else
              echo "Go: Frontmatter has $field"
            fi
          done

          for section in "## Imports" "## Core Patterns" "## Pitfalls"; do
            if ! grep -q "$section" "$FILE"; then
              echo "::error::Go: Missing required section: $section"
              ERRORS=$((ERRORS + 1))
            else
              echo "Go: Has section: $section"
            fi
          done

          # No security lint keywords in prose (basic sanity check)
          if awk '/^(```|~~~)/{p=!p; next} !p' "$FILE" | grep -Pn '(?<!`)rm -rf /(?!tmp)'; then
            echo "::error::Go: destructive command found in output"
            ERRORS=$((ERRORS + 1))
          else
            echo "Go: No destructive commands in prose"
          fi

          SIZE=$(wc -c < "$FILE")
          if [ "$SIZE" -lt 500 ]; then
            echo "::error::Go SKILL.md suspiciously small ($SIZE bytes)"
            ERRORS=$((ERRORS + 1))
          elif [ "$SIZE" -gt 512000 ]; then
            echo "::error::Go SKILL.md suspiciously large ($SIZE bytes)"
            ERRORS=$((ERRORS + 1))
          else
            echo "Go: Reasonable size ($SIZE bytes)"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Go E2E validation failed with $ERRORS error(s)"
            exit 1
          fi
          echo ""
          echo "=== Go E2E structural validation passed ==="

      - name: Lint Go generated skill
        if: steps.check-secret.outputs.skip != 'true'
        run: ./target/release/skilldo lint /tmp/chi-SKILL.md

      - name: Clone JS test library (lodash)
        if: steps.check-secret.outputs.skip != 'true'
        run: git clone --branch 4.17.21 --depth 1 https://github.com/lodash/lodash.git /tmp/lodash

      - name: Generate JavaScript SKILL.md
        if: steps.check-secret.outputs.skip != 'true'
        run: |
          ./target/release/skilldo generate /tmp/lodash \
            --provider openai-compatible \
            --model gpt-oss-120b \
            --base-url https://api.cerebras.ai/v1 \
            --language javascript \
            --max-retries 5 \
            -o /tmp/lodash-SKILL.md
        env:
          OPENAI_API_KEY: ${{ secrets.CEREBRAS2_API_KEY }}

      - name: Validate JavaScript output
        if: steps.check-secret.outputs.skip != 'true'
        run: |
          FILE="/tmp/lodash-SKILL.md"
          ERRORS=0

          if [ ! -s "$FILE" ]; then
            echo "::error::JS SKILL.md is empty or missing"
            exit 1
          fi
          echo "JS: File exists ($(wc -c < "$FILE") bytes)"

          if ! head -1 "$FILE" | grep -q '^---'; then
            echo "::error::JS: Missing YAML frontmatter"
            ERRORS=$((ERRORS + 1))
          else
            echo "JS: Has YAML frontmatter"
          fi

          for field in "name:" "version:" "ecosystem:"; do
            if ! head -20 "$FILE" | grep -q "$field"; then
              echo "::error::JS: Missing frontmatter field: $field"
              ERRORS=$((ERRORS + 1))
            else
              echo "JS: Frontmatter has $field"
            fi
          done

          for section in "## Imports" "## Core Patterns" "## Pitfalls"; do
            if ! grep -q "$section" "$FILE"; then
              echo "::error::JS: Missing required section: $section"
              ERRORS=$((ERRORS + 1))
            else
              echo "JS: Has section: $section"
            fi
          done

          if awk '/^(```|~~~)/{p=!p; next} !p' "$FILE" | grep -Pn '(?<!`)rm -rf /(?!tmp)'; then
            echo "::error::JS: destructive command found in output"
            ERRORS=$((ERRORS + 1))
          else
            echo "JS: No destructive commands in prose"
          fi

          SIZE=$(wc -c < "$FILE")
          if [ "$SIZE" -lt 500 ]; then
            echo "::error::JS SKILL.md suspiciously small ($SIZE bytes)"
            ERRORS=$((ERRORS + 1))
          elif [ "$SIZE" -gt 512000 ]; then
            echo "::error::JS SKILL.md suspiciously large ($SIZE bytes)"
            ERRORS=$((ERRORS + 1))
          else
            echo "JS: Reasonable size ($SIZE bytes)"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::JS E2E validation failed with $ERRORS error(s)"
            exit 1
          fi
          echo ""
          echo "=== JS E2E structural validation passed ==="

      - name: Lint JavaScript generated skill
        if: steps.check-secret.outputs.skip != 'true'
        run: ./target/release/skilldo lint /tmp/lodash-SKILL.md

      - name: Upload generated skills
        if: steps.check-secret.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-skills
          path: |
            /tmp/click-SKILL.md
            /tmp/chi-SKILL.md
            /tmp/lodash-SKILL.md
          if-no-files-found: ignore
